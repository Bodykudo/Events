<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="utils.css">

    <style>
      /* Fonts and Variables */

      @import url("https://fonts.googleapis.com/css2?family=Charm:wght@700&display=swap");

      :root {
        --font: "Charm", cursive;
        --bg: url("img/bg_ch.png");
        --text-bg: url("img/text_ch.png");
        --text-duration: 90s;
        --bg-duration: 20s;
      }

      /* Lights Animations */

      @keyframes first-flash {
        0%,
        100% {
          background: rgba(255, 230, 65, 1);
          box-shadow: 0px 2px 20px 4px rgba(255, 230, 65, 1);
        }

        50% {
          background: rgba(255, 230, 65, 0.5);
          box-shadow: 0px 2px 20px 4px rgba(255, 230, 65, 0.3);
        }
      }

      @keyframes second-flash {
        0%,
        100% {
          background: rgba(255, 65, 185, 1);
          box-shadow: 0px 2px 20px 4px rgba(255, 65, 185, 1);
        }

        50% {
          background: rgba(255, 65, 185, 0.5);
          box-shadow: 0px 2px 20px 4px rgba(255, 65, 185, 0.3);
        }
      }

      @keyframes third-flash {
        0%,
        100% {
          background: rgba(100, 65, 255, 1);
          box-shadow: 0px 2px 20px 4px rgba(100, 65, 255, 1);
        }

        50% {
          background: rgba(100, 65, 255, 0.5);
          box-shadow: 0px 2px 20px 4px rgba(100, 65, 255, 0.3);
        }
      }

      @keyframes fourth-flash {
        0%,
        100% {
          background: rgba(85, 255, 65, 1);
          box-shadow: 0px 2px 20px 4px rgba(85, 255, 65, 1);
        }

        50% {
          background: rgba(85, 255, 65, 0.5);
          box-shadow: 0px 2px 20px 4px rgba(85, 255, 65, 0.3);
        }
      }
    </style>
    
    <link rel="icon" href="img/icon_ch.png">
    <title>Christmas</title>
  </head>
  <body>
    <div class="container">
      <ul class="wire">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
      </ul>

      <div class="flex-container">
        <h1 class="animated">Merry Christmas</h1>
        <!-- <img src="https://i.ibb.co/8D6XK4m/logo.png" alt="logo" /> -->
      </div>

      <ul class="wire reverse">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
        <li class="extra"></li>
      </ul>
    </div>
  </body>
</html>
